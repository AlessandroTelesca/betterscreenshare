<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting</title>
    <script>
      (function () {
        var redirectPath = location.pathname + location.search + location.hash
        sessionStorage.setItem('betterscreenshare:redirect-path', redirectPath)
        location.replace(new URL('.', location.href).toString())
      })()
    </script>
  </head>
  <body></body>
</html>
